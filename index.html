<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quiz Area Assistenti</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23e4002b'/%3E%3Cpath d='M7 8h18v3H7zm0 6h18v3H7zm0 6h11v3H7z' fill='white'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="masthead" aria-labelledby="app-title">
        <div>
          <p class="eyebrow">Esercitazione PEO</p>
          <h1 id="app-title">Quiz Area Assistenti</h1>
        </div>
        <div class="summary-grid" aria-label="Statistiche sessione">
          <div>
            <span id="total-count">300</span>
            <small>domande</small>
          </div>
          <div>
            <span id="score-count">0</span>
            <small>corrette</small>
          </div>
          <div>
            <span id="wrong-count">0</span>
            <small>errori</small>
          </div>
        </div>
      </section>

      <section class="controls" aria-label="Controlli quiz">
        <div class="progress-wrap">
          <div class="progress-meta">
            <span id="question-position">Domanda 1 di 300</span>
            <span id="source-id">PDF n. 001</span>
          </div>
          <div class="progress-track" aria-hidden="true">
            <span id="progress-bar"></span>
          </div>
        </div>
        <div class="button-row">
          <button id="shuffle-btn" type="button">Nuova sequenza</button>
          <button id="reset-btn" type="button">Azzera risultati</button>
        </div>
      </section>

      <section class="quiz-panel" aria-live="polite">
        <article class="question-card">
          <div class="question-number" id="display-number">001</div>
          <h2 id="question-text"></h2>
          <div class="answers" id="answers"></div>
          <div class="feedback" id="feedback" hidden></div>
        </article>

        <div class="navigation">
          <button id="prev-btn" type="button">Precedente</button>
          <button id="next-btn" type="button">Successiva</button>
        </div>
      </section>
    </main>

    <script src="questions-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
